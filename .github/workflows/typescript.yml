name: TypeScript

on:
  workflow_dispatch:
  push:
    branches:
      - "*.*.*"
      - main
      - master
  pull_request:
    branches:
      - "*"

env:
  HUSKY: 0

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      chatbot_backend: ${{ steps.filter.outputs.chatbot_backend }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed app paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            chatbot_backend:
              - 'apps/chatbot-backend/**'

  typecheck-frontend:
    name: Typecheck Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: ./apps/frontend/node_modules
          key: ${{ runner.os }}-frontend-modules-${{ hashFiles('apps/frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-modules-

      - name: Install Dependencies
        run: npm install

      - name: Run Typecheck
        run: npm run typecheck

  typecheck-chatbot-backend:
    name: Typecheck Chatbot Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.chatbot_backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/chatbot-backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: ./apps/chatbot-backend/node_modules
          key: ${{ runner.os }}-chatbot-backend-modules-${{ hashFiles('apps/chatbot-backend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-chatbot-backend-modules-

      - name: Install Dependencies
        run: npm install

      - name: Run Typecheck
        run: npm run typecheck
