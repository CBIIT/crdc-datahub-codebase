name: Build Images for CRDC DH
permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build from Github Actions
        type: environment
        default: build
      build:
        description: build docker images
        required: true
        type: boolean
        default: true
      trivy_scan:
        description: "Run Trivy Scan"
        required: true
        type: boolean
        default: true
run-name: "Build Docker Images for CRDC DH"

jobs:

  # ──────────────────────────────────────────────
  # Job 1: Compute the image tag once, share it
  # ──────────────────────────────────────────────
  prepare:
    name: Prepare Image Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          submodules: true
          fetch-depth: 0

      - name: Extract branch name and set image tag
        id: set_tag
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          echo "Current branch is: $BRANCH_NAME"
          git fetch --tags --force --quiet
          tag=$(git tag -l $BRANCH_NAME* | sort -V | tail -1)
          if [ ! -z "$tag" ]; then
            build_num=$(echo "${tag##*.}")
            build_num=$((build_num+1))
          else
            build_num=1
          fi
          IMAGE_TAG="$BRANCH_NAME.$build_num"
          echo "IMAGE_TAG=$IMAGE_TAG"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Job 2: Build + Trivy scan + Push each image in parallel
  # ──────────────────────────────────────────────
  build:
    name: Build & Scan - ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ inputs.environment }}
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      REGION: "us-east-1"
    strategy:
      fail-fast: false   # let all matrix jobs run even if one fails
      matrix:
        include:
          - name: authn
            ecr_repo: crdc-hub-authn
            dockerfile: apps/authn/Dockerfile
            context: apps/authn
          - name: backend
            ecr_repo: crdc-gen-backend
            dockerfile: apps/backend/Dockerfile
            context: apps/backend
          - name: frontend
            ecr_repo: crdc-hub-frontend
            dockerfile: apps/frontend/Dockerfile
            context: apps/frontend
          - name: chatbot-backend
            ecr_repo: crdc-hub-chatbot-be
            dockerfile: apps/chatbot-backend/Dockerfile
            context: apps/chatbot-backend
          - name: essential-validation
            ecr_repo: crdc-hub-essentialvalidation
            dockerfile: apps/validator/essentialvalidation.dockerfile
            context: apps/validator
          - name: export-validation
            ecr_repo: crdc-hub-exportvalidation
            dockerfile: apps/validator/export.dockerfile
            context: apps/validator
          - name: file-validation
            ecr_repo: crdc-hub-filevalidation
            dockerfile: apps/validator/filevalidation.dockerfile
            context: apps/validator
          - name: metadata-validation
            ecr_repo: crdc-hub-metadatavalidation
            dockerfile: apps/validator/metadatavalidation.dockerfile
            context: apps/validator
          - name: pv-puller
            ecr_repo: crdc-hub-pvpuller
            dockerfile: apps/validator/pv_puller.dockerfile
            context: apps/validator

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          submodules: true

      - name: Set image name
        run: |
          echo "IMAGE_NAME=${{ secrets.AWS_ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ matrix.ecr_repo }}:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build --no-cache \
            -t $IMAGE_NAME \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}

      - name: Run Trivy Scan
        if: ${{ inputs.trivy_scan == true }}
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          echo "========================================"
          echo "Scanning: $IMAGE_NAME"
          echo "========================================"
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --no-progress \
            --format table \
            "$IMAGE_NAME"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_BUILD_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        run: |
          REGISTRY_URL="${{ secrets.AWS_ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REGISTRY_URL

      - name: Push Image to ECR
        run: |
          echo "Pushing: $IMAGE_NAME"
          docker push $IMAGE_NAME

  # ──────────────────────────────────────────────
  # Job 3: Tag the commit only after all builds pass
  # ──────────────────────────────────────────────
  tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Create and push git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@users.noreply.github.com"
          git tag ${{ needs.prepare.outputs.image_tag }}
          git push origin ${{ needs.prepare.outputs.image_tag }}

  # ──────────────────────────────────────────────
  # Job 4: Slack notification (always runs)
  # ──────────────────────────────────────────────
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [build, tag]
    if: always()
    steps:
      - name: Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: act10ns/slack@87c73aef9f8838eb6feae81589a6b1487a4a9e08  # v1.6.0
        with:
          status: ${{ needs.build.result }}
