name: Test

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - "*.*.*"
      - main
      - master
  pull_request:
    branches:
      - "*"

run-name: "Tests – ${{ github.event_name == 'pull_request' && format('PR #{0})', github.event.pull_request.number) || github.ref_name }}"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: PR opened → run on source (head) branch
  # ──────────────────────────────────────────────

  pr-unit-test-npm:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: authn
            context: apps/authn
            test-command: npm run test
            prisma: false
            node-version: "24"

          - name: backend
            context: apps/backend
            test-command: npm run test:ci
            prisma: true
            node-version: "24"

          - name: frontend
            context: apps/frontend
            test-command: npm run test:ci
            prisma: false
            node-version: "22"

          - name: chatbot-backend
            context: apps/chatbot-backend
            test-command: npm run test
            prisma: false
            node-version: "24"

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          clean: true
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: ./${{ matrix.context }}/node_modules
          key: ${{ runner.os }}-frontend-modules-${{ hashFiles(format('{0}/package-lock.json', matrix.context)) }}
          restore-keys: ${{ runner.os }}-frontend-modules-

      - name: Copy db-driver subfolders
        if: ${{ matrix.name == 'authn' || matrix.name == 'backend' }}
        run: |
          cp -rL lib/db-driver/. ${{ matrix.context }}/tmp-crdc-datahub-database-drivers/
          rm -rf ${{ matrix.context }}/crdc-datahub-database-drivers
          mv ${{ matrix.context }}/tmp-crdc-datahub-database-drivers ${{ matrix.context }}/crdc-datahub-database-drivers

      - name: Install Dependencies
        working-directory: ${{ matrix.context }}
        run: npm install

      - name: Setup Prisma
        if: ${{ matrix.prisma }}
        working-directory: ${{ matrix.context }}
        run: npx prisma generate

      - name: Run tests
        working-directory: ${{ matrix.context }}
        run: ${{ matrix.test-command }}

      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2
        with:
          flag-name: ${{ matrix.name }}
          base-path: ${{ matrix.context }}
          parallel: true
        continue-on-error: true

  pr-unit-test-python:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: validators
            context: apps/validator

          - name: cli-uploader
            context: apps/cli-uploader

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive
          clean: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        working-directory: ${{ matrix.context }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Copy bento-common subfolders
        if: ${{ matrix.name == 'validators' || matrix.name == 'cli-uploader' }}
        run: |
          cp -rL lib/bento-common/. ${{ matrix.context }}/src/tmp-bento/
          rm -rf ${{ matrix.context }}/src/bento
          mv ${{ matrix.context }}/src/tmp-bento ${{ matrix.context }}/src/bento

      - name: Run unit tests
        working-directory: ${{ matrix.context }}
        run: pytest

      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2
        with:
          flag-name: ${{ matrix.name }}
          base-path: ${{ matrix.context }}
          parallel: true
        continue-on-error: true

  upload-coveralls:
    name: Upload to Coveralls
    runs-on: ubuntu-latest
    needs: [pr-unit-test-npm, pr-unit-test-python]
    steps:
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Slack notification (always runs)
  # ──────────────────────────────────────────────
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [pr-unit-test-npm, pr-unit-test-python]
    if: always()
    steps:
      - name: Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: act10ns/slack@87c73aef9f8838eb6feae81589a6b1487a4a9e08 # v1.6.0
        with:
          status: ${{ (contains(needs.*.result, 'failure')) && 'failure' || 'success' }}
