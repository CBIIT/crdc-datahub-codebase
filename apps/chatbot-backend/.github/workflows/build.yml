name: Build Chatbot Backend
permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Choose the environment to build
        type: environment
      #branch:
      #description: Branch to build
      #required: true
      trivy_test_scan_chatbot_be:
        description: "Run Trivy Test Scan"
        required: true
        type: boolean
        default: true
      unit_test:
        description: "Run Unit Test"
        required: true
        type: boolean
        default: true

  pull_request:
    types:
      - closed
    branches:
      - "*.*.*"

jobs:
  build-chatbot-backend:
    name: Build chatbot backend image
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'build' }}
    env:
      ECR_REPO_CHATBOT_BE: "crdc-hub-chatbot-be"
      REGION: "us-east-1"
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TRIVY_TEST_SCAN_CHATBOT_BE: ${{ github.event.inputs.trivy_test_scan_chatbot_be != '' && github.event.inputs.trivy_test_scan_chatbot_be || 'true' }}
      UNIT_TEST: ${{ github.event.inputs.unit_test != '' && github.event.inputs.unit_test || 'true' }}

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.pull_request.base.ref }}
          submodules: recursive
          clean: true
          fetch-depth: 0

      - name: Extract branch name and set tag image
        id: extract_branch
        run: |
          #BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          # Determine branch name
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          #good  BRANCH_NAME="${{ github.event.inputs.branch }}"
            BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          else
            BRANCH_NAME="${{ github.event.pull_request.base.ref }}"
          fi

          echo "branch=$BRANCH_NAME" >> "$GITHUB_ENV"
          echo "Current branch is: $BRANCH_NAME"

          # fetch tags and determine next build number
          git fetch --tags --force --quiet
          #tag=$(git tag -l $BRANCH_NAME* | tail -1)
          tag=$(git tag -l $BRANCH_NAME* | sort -V | tail -1)
          if  [ ! -z "$tag" ];
          then
            # Increment the build number if a tag is found
            build_num=$(echo "${tag##*.}")
            build_num=$((build_num+1))
            echo "IMAGE_TAG=$BRANCH_NAME.$build_num" >> $GITHUB_ENV
          else
            # If no tag is found create a new tag name
            build_num=1
            echo "IMAGE_TAG=$BRANCH_NAME.$build_num" >> $GITHUB_ENV
          fi

      - name: Debug env
        run: |
          node -v
          npm -v
          echo "Runner: $RUNNER_NAME"
          echo "OS Info:"
          uname -a
          cat /etc/os-release
          echo "Directory contents:"
          ls -latr

      - name: Setup Node
        uses: actions/setup-node@v4
        if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'workflow_dispatch' && inputs.unit_test == true)
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Run Unit Test
        id: unit-test
        if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'workflow_dispatch' && inputs.unit_test == true)
        run: |
          echo "Running unit tests..."
          npm i
          npm run test:ci

      - name: Build Chatbot Backend Docker Image
        id: build-image
        env:
          REGISTRY_URL: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          CHATBOT_BE_IMAGE_NAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_CHATBOT_BE }}:${{ env.IMAGE_TAG }}
        run: |
          echo "Building: $CHATBOTBE_IMAGE_NAME"
          docker build --no-cache -t $CHATBOT_BE_IMAGE_NAME .

      - name: Run Trivy test scan for CHATBOT BE Docker Image
        id: trivy-scan-be
        if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'workflow_dispatch' && inputs.trivy_test_scan_be == true)
        env:
          REGISTRY_URL: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          CHATBOT_BE_IMAGE_NAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_CHATBOT_BE }}:${{ env.IMAGE_TAG }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.CHATBOT_BE_IMAGE_NAME }}"
          format: "table"
          exit-code: 1
          severity: "CRITICAL,HIGH"

      - name: Create git tag for image
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@users.noreply.github.com"
          git tag ${{ env.IMAGE_TAG }}
          git push origin ${{ env.IMAGE_TAG }}

      - name: Configure AWS Role to assume using OIDC authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      - name: Login to Amazon ECR
        id: login-ecr
        env:
          REGISTRY_URL: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REGISTRY_URL

      - name: Push docker Image for BE
        if: success()
        env:
          REGISTRY_URL: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com
          CHATBOT_BE_IMAGE_NAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_CHATBOT_BE }}:${{ env.IMAGE_TAG }}
        run: |
          echo "Pushing: $CHATBOT_BE_IMAGE_NAME"
          docker push $CHATBOT_BE_IMAGE_NAME

      - name: Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: act10ns/slack@87c73aef9f8838eb6feae81589a6b1487a4a9e08 # v1.6.0
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: always()
